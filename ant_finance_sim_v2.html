<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐜 개미 재테크 시뮬레이터</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080f08;
    --bg2: #0f1a0f;
    --bg3: #162416;
    --border: #1e4018;
    --border-bright: #2d6020;
    --gold: #ffd700;
    --gold-dim: #c8a800;
    --green: #4ecb71;
    --red: #ff5555;
    --text: #c8e0b0;
    --text-dim: #6a9050;
    --orange: #ff9944;
    --glow: 0 0 20px #ffd70033;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    background-image:
      radial-gradient(ellipse at 20% 0%, #0f2a0f88 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, #1a3a0a44 0%, transparent 50%);
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px #ffd70066, 0 2px 4px #000;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .header .sub {
    color: var(--text-dim);
    font-size: 0.82rem;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }
  .header .season-badge {
    display: inline-block;
    background: linear-gradient(135deg, #1e4018, #2d6020);
    border: 1px solid var(--border-bright);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.78rem;
    color: var(--gold);
    margin-top: 8px;
    box-shadow: 0 0 10px #ffd70022;
  }

  /* ── CONTAINER ── */
  .container { width: 100%; max-width: 920px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }

  /* ── CARD ── */
  .card {
    background: linear-gradient(145deg, #122012, #0f1a0f);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    flex: 1;
    min-width: 240px;
    box-shadow: 0 4px 20px #00000060, inset 0 1px 0 #1e4018;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2d6020, transparent);
  }
  .card h2 {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── COLONY ── */
  #colony-display {
    font-size: 1.6rem;
    letter-spacing: 1px;
    margin: 6px 0 10px;
    min-height: 48px;
    word-break: break-all;
    line-height: 1.4;
    text-align: center;
    background: var(--bg);
    border-radius: 10px;
    padding: 8px;
    border: 1px solid var(--border);
  }
  .colony-ants { animation: antWiggle 2s infinite; display: inline-block; }
  @keyframes antWiggle {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  .turn-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 6px;
  }
  .turn-row span { color: var(--gold); font-weight: 700; }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin: 10px 0 4px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.74rem;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .progress-label strong { color: var(--text); }
  .progress-track {
    background: var(--bg);
    border-radius: 20px;
    height: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, #1e6020, #ffd700);
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    top: 1px; right: 2px; bottom: 1px;
    width: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 20px;
    filter: blur(2px);
  }

  /* ── STATS ── */
  .stat-grid { display: flex; flex-direction: column; gap: 7px; }
  .stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.88rem;
    padding: 5px 8px;
    border-radius: 8px;
    background: #0a130a;
    border: 1px solid #111e11;
  }
  .stat .label { color: var(--text-dim); font-size: 0.8rem; }
  .stat .value { color: var(--gold); font-weight: 700; font-size: 0.92rem; font-variant-numeric: tabular-nums; }
  .stat .value.green { color: var(--green); }
  .stat .value.red { color: var(--red); }
  .stat.highlight { border-color: var(--border-bright); background: #0f1f0f; }
  .stat.highlight .value { color: #fff; font-size: 1rem; }
  .stat.highlight .label { color: var(--text); }

  /* ── INVESTMENT GRID ── */
  .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .inv-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s cubic-bezier(.4,0,.2,1);
    color: var(--text);
    position: relative;
    overflow: hidden;
  }
  .inv-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, #ffffff08);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .inv-btn:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 6px 20px #00000060, 0 0 12px #ffd70022; }
  .inv-btn:hover::before { opacity: 1; }
  .inv-btn:active { transform: translateY(-1px); }
  .inv-btn.selected { border-color: var(--gold); box-shadow: 0 0 14px #ffd70033; background: #131f13; }
  .inv-btn .inv-icon { font-size: 1.5rem; margin-bottom: 4px; }
  .inv-btn .inv-name { font-size: 0.8rem; font-weight: 700; color: var(--gold); }
  .inv-btn .inv-rate { font-size: 0.72rem; color: var(--text-dim); margin: 3px 0 2px; }
  .inv-btn .inv-risk { font-size: 0.7rem; }

  /* ── SLIDER ── */
  .slider-section {
    margin-top: 14px;
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .slider-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .slider-top label { font-size: 0.8rem; color: var(--text-dim); }
  .slider-top .slider-amount { font-size: 1rem; font-weight: 700; color: var(--gold); }
  input[type=range] {
    width: 100%;
    height: 6px;
    accent-color: var(--gold);
    cursor: pointer;
    border-radius: 10px;
  }
  .invest-confirm-btn {
    width: 100%;
    margin-top: 10px;
    background: linear-gradient(135deg, #1e5018, #2d7020);
    border: 1px solid var(--border-bright);
    border-radius: 10px;
    padding: 10px;
    color: var(--gold);
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
  }
  .invest-confirm-btn:hover { background: linear-gradient(135deg, #2a6020, #3a8030); box-shadow: 0 0 14px #ffd70022; }
  .invest-confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── ACTION BUTTONS ── */
  .action-grid { display: flex; flex-direction: column; gap: 8px; }
  .btn {
    background: #132013;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 0.84rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover { border-color: var(--border-bright); background: #1a2a1a; transform: translateX(2px); }
  .btn.primary {
    background: linear-gradient(135deg, #1e5018, #2d7020);
    border-color: var(--border-bright);
    color: var(--gold);
    font-size: 0.92rem;
    justify-content: center;
    box-shadow: 0 2px 10px #00000040;
  }
  .btn.primary:hover { box-shadow: 0 0 16px #ffd70033; transform: translateY(-1px); }
  .btn.danger { border-color: #3a1010; color: #ff8888; }
  .btn.danger:hover { background: #1f1010; border-color: #6a2020; }

  /* ── NEXT TURN BIG BTN ── */
  .next-turn-btn {
    width: 100%;
    background: linear-gradient(135deg, #1a4a18, #28600a, #1a4a18);
    border: 1px solid #3a8020;
    border-radius: 14px;
    padding: 16px;
    color: var(--gold);
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 20px #00000060, inset 0 1px 0 #4a9030;
    position: relative;
    overflow: hidden;
  }
  .next-turn-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .next-turn-btn:hover { box-shadow: 0 6px 24px #00000080, 0 0 20px #ffd70033; transform: translateY(-2px); }
  .next-turn-btn:hover::after { opacity: 1; }
  .next-turn-btn:active { transform: translateY(0); }

  /* ── LOG ── */
  #log {
    height: 150px;
    overflow-y: auto;
    font-size: 0.78rem;
    line-height: 1.7;
    color: var(--text-dim);
    background: var(--bg);
    border-radius: 10px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .log-entry { padding: 2px 0; border-bottom: 1px solid #0f180f; display: flex; gap: 6px; }
  .log-entry .log-q { color: #3a5a3a; font-size: 0.72rem; white-space: nowrap; padding-top: 1px; }
  .log-entry.profit { color: var(--green); }
  .log-entry.loss { color: var(--red); }
  .log-entry.info { color: #88aaff; }

  /* ── WEALTH CHART ── */
  #wealth-chart {
    width: 100%;
    height: 70px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border);
    display: block;
    margin-top: 6px;
  }

  /* ── INFLATION TICKER ── */
  .ticker-bar {
    display: flex;
    gap: 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 0.78rem;
    flex-wrap: wrap;
  }
  .ticker-item { display: flex; align-items: center; gap: 6px; color: var(--text-dim); }
  .ticker-item .tv { color: var(--gold); font-weight: 700; }
  .ticker-item .tv.up { color: var(--green); }
  .ticker-item .tv.down { color: var(--red); }
  .ticker-item .tv.warn { color: var(--orange); }

  /* ── GAME OVER ── */
  #gameover {
    display: none;
    position: fixed; inset: 0;
    background: #000000dd;
    backdrop-filter: blur(8px);
    justify-content: center; align-items: center;
    z-index: 99;
    flex-direction: column;
    gap: 16px;
  }
  .gameover-box {
    background: linear-gradient(145deg, #122012, #0f1a0f);
    border: 1px solid var(--border-bright);
    border-radius: 24px;
    padding: 40px 48px;
    text-align: center;
    box-shadow: 0 0 60px #ffd70022, 0 20px 60px #00000080;
    max-width: 400px;
  }
  .gameover-box h2 { font-size: 2.8rem; color: var(--gold); text-shadow: 0 0 40px #ffd700; margin-bottom: 8px; }
  .gameover-box p { color: var(--text); font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; }
  .gameover-box .btn.primary { width: 100%; justify-content: center; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a3a1a;
    border: 1px solid var(--border-bright);
    border-radius: 30px;
    padding: 10px 24px;
    font-size: 0.85rem;
    color: var(--gold);
    font-weight: 700;
    box-shadow: 0 8px 30px #00000080;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
    opacity: 0;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── PULSE ANIMATION ── */
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .pulse { animation: pulse 1.5s infinite; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .header h1 { font-size: 1.6rem; }
    .inv-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🐜 개미 재테크 시뮬레이터</h1>
  <div class="sub">ant money_bot × AntIdea_bot | 개미 콜로니로 부를 쌓아라!</div>
  <div class="season-badge" id="season-badge">📅 1분기 진행 중</div>
</div>

<div class="container">

  <!-- TICKER -->
  <div class="ticker-bar">
    <div class="ticker-item">💰 현금 <span class="tv" id="tk-cash">1,000</span></div>
    <div class="ticker-item">📈 투자 <span class="tv up" id="tk-inv">0</span></div>
    <div class="ticker-item">🏦 저축 <span class="tv" id="tk-sav">0</span></div>
    <div class="ticker-item">🌡️ 인플레이션 <span class="tv warn" id="tk-inf">3.0%</span></div>
    <div class="ticker-item">🐜 개미 <span class="tv" id="tk-ants">1마리</span></div>
  </div>

  <!-- ROW 1 -->
  <div class="row">
    <!-- Colony Card -->
    <div class="card" style="flex:1.3">
      <h2>🏠 내 콜로니</h2>
      <div id="colony-display"><span class="colony-ants">🐜</span></div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>콜로니 규모</span>
          <strong id="colony-size-label">1 / 100마리</strong>
        </div>
        <div class="progress-track"><div class="progress-fill" id="colony-bar" style="width:1%"></div></div>
      </div>
      <div class="turn-row">
        <span>📅 <span id="turn-display">1</span>분기</span>
        <span>실질 구매력: <span id="stat-real">1,000</span></span>
      </div>
    </div>

    <!-- Stats Card -->
    <div class="card" style="flex:1">
      <h2>💼 재정 현황</h2>
      <div class="stat-grid">
        <div class="stat"><span class="label">보유 현금</span><span class="value" id="stat-cash">1,000</span></div>
        <div class="stat"><span class="label">투자 자산</span><span class="value green" id="stat-invested">0</span></div>
        <div class="stat"><span class="label">저축 (복리 2%)</span><span class="value" id="stat-savings">0</span></div>
        <div class="stat highlight"><span class="label">순자산</span><span class="value" id="stat-net">1,000</span></div>
      </div>
      <div class="progress-wrap" style="margin-top:12px">
        <div class="progress-label">
          <span>목표 달성률</span>
          <strong id="goal-pct">10%</strong>
        </div>
        <div class="progress-track"><div class="progress-fill" id="goal-bar" style="width:10%"></div></div>
      </div>
    </div>
  </div>

  <!-- ROW 2 -->
  <div class="row">
    <!-- Investment Card -->
    <div class="card" style="flex:1.6">
      <h2>📈 투자 선택</h2>
      <div class="inv-grid">
        <button class="inv-btn" id="btn-savings" onclick="selectInvest('savings')">
          <div class="inv-icon">💵</div>
          <div class="inv-name">저축</div>
          <div class="inv-rate">연 2% 확정</div>
          <div class="inv-risk">🟢 무위험</div>
        </button>
        <button class="inv-btn" id="btn-bond" onclick="selectInvest('bond')">
          <div class="inv-icon">📜</div>
          <div class="inv-name">채권</div>
          <div class="inv-rate">연 4~6%</div>
          <div class="inv-risk">🟡 낮은 위험</div>
        </button>
        <button class="inv-btn" id="btn-stock" onclick="selectInvest('stock')">
          <div class="inv-icon">📊</div>
          <div class="inv-name">주식</div>
          <div class="inv-rate">-20% ~ +30%</div>
          <div class="inv-risk">🟠 중간 위험</div>
        </button>
        <button class="inv-btn" id="btn-crypto" onclick="selectInvest('crypto')">
          <div class="inv-icon">🪙</div>
          <div class="inv-name">코인</div>
          <div class="inv-rate">-50% ~ +100%</div>
          <div class="inv-risk">🔴 고위험</div>
        </button>
      </div>
      <div class="slider-section">
        <div class="slider-top">
          <label>투자 금액</label>
          <span class="slider-amount" id="inv-amount-label">500</span>
        </div>
        <input type="range" id="inv-amount" min="10" max="1000" step="10" value="500" oninput="updateSlider()">
        <button class="invest-confirm-btn" id="invest-btn" onclick="confirmInvest()" disabled>투자 유형을 선택하세요</button>
      </div>
    </div>

    <!-- Actions Card -->
    <div class="card" style="flex:1">
      <h2>⚡ 행동</h2>
      <div class="action-grid">
        <button class="btn" onclick="withdrawSavings()">🏦 저축 인출</button>
        <button class="btn" onclick="withdrawInvested()">💸 투자 회수</button>
        <button class="btn" onclick="buyAnts()">🐜 일개미 고용 <small style="color:var(--gold)">(-50)</small></button>
        <button class="btn danger" onclick="resetGame()">🔄 처음부터</button>
      </div>
      <div style="margin-top: 12px; font-size:0.72rem; color:var(--orange); text-align:center; padding: 6px; background:var(--bg); border-radius:8px; border:1px solid #3a2010;">
        ⚠️ 인플레이션으로 현금 가치 하락 중
      </div>
    </div>
  </div>

  <!-- NEXT TURN -->
  <button class="next-turn-btn" onclick="nextTurn()">
    ⏭️ 다음 분기로 넘어가기
  </button>

  <!-- CHART + LOG -->
  <div class="row">
    <div class="card" style="flex:1">
      <h2>📊 자산 추이</h2>
      <canvas id="wealth-chart"></canvas>
    </div>
    <div class="card" style="flex:1.5">
      <h2>📋 거래 로그</h2>
      <div id="log"></div>
    </div>
  </div>

</div>

<!-- GAME OVER -->
<div id="gameover">
  <div class="gameover-box">
    <h2 id="gameover-title">🏆 승리!</h2>
    <p id="gameover-msg"></p>
    <button class="btn primary" onclick="resetGame()">🔄 다시 시작</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════
// FINANCIAL LOGIC ENGINE — by ant money_bot
// ══════════════════════════════════════

const INVESTMENT_PROFILES = {
  savings: {
    name: '저축',
    returns: () => 0.02 / 4,
    risk: 0,
  },
  bond: {
    name: '채권',
    returns: () => (randBetween(4, 6) / 100) / 4,
    risk: 0.05,
  },
  stock: {
    name: '주식',
    returns: () => randBetween(-20, 30) / 100 / 4,
    risk: 0.15,
  },
  crypto: {
    name: '코인',
    returns: () => randBetween(-50, 100) / 100 / 4,
    risk: 0.25,
  },
};

let state = {};
let wealthHistory = [];
let selectedInvestType = null;

function initState() {
  state = {
    cash: 1000,
    savings: 0,
    invested: 0,
    investType: null,
    ants: 1,
    turn: 1,
    inflation: 0.03,
    inflationFactor: 1,
    basePurchasingPower: 1000,
  };
  wealthHistory = [1000];
  selectedInvestType = null;
}

function randBetween(min, max) {
  return Math.random() * (max - min) + min;
}

function applySavingsInterest() {
  const rate = 0.02 / 4;
  const interest = Math.round(state.savings * rate);
  state.savings += interest;
  return interest;
}

function applyInflation() {
  const qRate = state.inflation / 4;
  state.inflationFactor *= (1 + qRate);
  state.inflation = Math.max(0.01, Math.min(0.08,
    state.inflation + randBetween(-0.00125, 0.00125)
  ));
}

function realValue(nominal) {
  return Math.round(nominal / state.inflationFactor);
}

function netWorth() {
  return state.cash + state.savings + state.invested;
}

// ── UI: INVEST SELECT ──
function selectInvest(type) {
  selectedInvestType = type;
  document.querySelectorAll('.inv-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-' + type).classList.add('selected');
  const btn = document.getElementById('invest-btn');
  const names = {savings:'저축', bond:'채권', stock:'주식', crypto:'코인'};
  btn.disabled = false;
  btn.textContent = `✅ ${names[type]} 투자 실행`;
}

function confirmInvest() {
  if (!selectedInvestType) return;
  invest(selectedInvestType);
}

// ── INVEST ──
function invest(type) {
  const amount = parseInt(document.getElementById('inv-amount').value);
  if (amount > state.cash) {
    showToast('💸 현금이 부족합니다!');
    addLog(`현금 부족! (보유: ${fmt(state.cash)})`, 'loss');
    return;
  }
  const profile = INVESTMENT_PROFILES[type];
  const ret = profile.returns();
  const gain = Math.round(amount * ret);
  state.cash -= amount;

  if (type === 'savings') {
    state.savings += amount;
    addLog(`${profile.name} ${fmt(amount)} 예치 완료 (연 2% 복리)`, 'info');
    showToast('🏦 저축 완료!');
  } else {
    const loss_event = Math.random() < profile.risk;
    if (loss_event) {
      const lossRate = randBetween(0.05, 0.15);
      const lost = Math.round(amount * lossRate);
      state.invested += (amount - lost);
      addLog(`⚠️ ${profile.name} 리스크 발생! ${fmt(lost)} 손실 후 ${fmt(amount - lost)} 투자`, 'loss');
      showToast(`⚠️ 리스크 발생! -${fmt(lost)}`);
    } else {
      state.invested += amount;
      addLog(`${profile.name} ${fmt(amount)} 투자 시작`, 'info');
      showToast(`📈 ${profile.name} 투자 시작!`);
    }
    state.investType = type;
  }
  updateUI();
}

// ── NEXT TURN ──
function nextTurn() {
  state.turn++;

  const interest = applySavingsInterest();
  if (interest > 0) addLog(`💵 저축 이자 +${fmt(interest)} (복리)`, 'profit');

  if (state.invested > 0 && state.investType) {
    const profile = INVESTMENT_PROFILES[state.investType];
    const ret = profile.returns();
    const gain = Math.round(state.invested * ret);
    state.invested += gain;
    if (state.invested < 0) state.invested = 0;
    const emoji = gain >= 0 ? '📈' : '📉';
    addLog(`${emoji} ${profile.name} 수익: ${gain >= 0 ? '+' : ''}${fmt(gain)} (연환산 ${(ret * 400).toFixed(1)}%)`, gain >= 0 ? 'profit' : 'loss');
  }

  const antIncome = state.ants * 10;
  state.cash += antIncome;
  addLog(`🐜 개미 ${state.ants}마리 → +${fmt(antIncome)} 생산`, 'profit');

  applyInflation();
  addLog(`🌡️ 인플레이션 ${(state.inflation * 100).toFixed(1)}% 진행 중`, 'loss');

  wealthHistory.push(netWorth());
  if (wealthHistory.length > 30) wealthHistory.shift();

  document.getElementById('season-badge').textContent = `📅 ${state.turn}분기 진행 중`;

  if (netWorth() >= 10000) { endGame(true); return; }
  if (netWorth() <= 0) { endGame(false); return; }

  updateUI();
}

// ── ACTIONS ──
function withdrawSavings() {
  if (state.savings <= 0) { showToast('저축 잔액이 없어요'); return; }
  const amt = state.savings;
  state.cash += amt; state.savings = 0;
  addLog(`🏦 저축 인출: +${fmt(amt)}`, 'info');
  showToast(`🏦 저축 인출 +${fmt(amt)}`);
  updateUI();
}

function withdrawInvested() {
  if (state.invested <= 0) { showToast('투자 자산이 없어요'); return; }
  const amt = state.invested;
  state.cash += amt; state.invested = 0; state.investType = null;
  addLog(`💸 투자 회수: +${fmt(amt)}`, 'info');
  showToast(`💸 투자 회수 +${fmt(amt)}`);
  updateUI();
}

function buyAnts() {
  const cost = 50;
  if (state.cash < cost) { showToast('현금이 부족합니다!'); return; }
  state.cash -= cost; state.ants++;
  addLog(`🐜 일개미 고용! (총 ${state.ants}마리)`, 'info');
  showToast(`🐜 개미 고용! 총 ${state.ants}마리`);
  updateUI();
}

// ── CHART ──
function drawChart() {
  const canvas = document.getElementById('wealth-chart');
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth;
  const H = 70;
  canvas.width = W;
  canvas.height = H;

  if (wealthHistory.length < 2) return;
  ctx.clearRect(0, 0, W, H);

  const min = Math.min(...wealthHistory) * 0.9;
  const max = Math.max(...wealthHistory) * 1.05;
  const range = max - min || 1;

  const pts = wealthHistory.map((v, i) => [
    (i / (wealthHistory.length - 1)) * W,
    H - ((v - min) / range) * (H - 10) - 4
  ]);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(78,203,113,0.3)');
  grad.addColorStop(1, 'rgba(78,203,113,0)');
  ctx.beginPath();
  ctx.moveTo(pts[0][0], H);
  pts.forEach(([x,y]) => ctx.lineTo(x, y));
  ctx.lineTo(pts[pts.length-1][0], H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  pts.forEach(([x,y], i) => i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
  ctx.strokeStyle = '#4ecb71';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Last point dot
  const [lx, ly] = pts[pts.length-1];
  ctx.beginPath();
  ctx.arc(lx, ly, 4, 0, Math.PI*2);
  ctx.fillStyle = '#ffd700';
  ctx.fill();

  // Goal line
  const goalY = H - ((10000 - min) / range) * (H - 10) - 4;
  if (goalY > 0 && goalY < H) {
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(0, goalY);
    ctx.lineTo(W, goalY);
    ctx.strokeStyle = 'rgba(255,215,0,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ── UI ──
function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }

function updateSlider() {
  const v = document.getElementById('inv-amount').value;
  document.getElementById('inv-amount-label').textContent = fmt(v);
  const maxVal = Math.max(10, Math.floor(state.cash / 10) * 10);
  document.getElementById('inv-amount').max = Math.min(maxVal, 100000);
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function updateUI() {
  const nw = netWorth();
  document.getElementById('stat-cash').textContent = fmt(state.cash);
  document.getElementById('stat-invested').textContent = fmt(state.invested);
  document.getElementById('stat-savings').textContent = fmt(state.savings);
  document.getElementById('stat-net').textContent = fmt(nw);
  document.getElementById('stat-real').textContent = fmt(realValue(nw));

  document.getElementById('tk-cash').textContent = fmt(state.cash);
  document.getElementById('tk-inv').textContent = fmt(state.invested);
  document.getElementById('tk-sav').textContent = fmt(state.savings);
  document.getElementById('tk-inf').textContent = (state.inflation * 100).toFixed(1) + '%';
  document.getElementById('tk-ants').textContent = state.ants + '마리';

  document.getElementById('turn-display').textContent = state.turn;

  const antCount = Math.min(state.ants, 40);
  document.getElementById('colony-display').innerHTML =
    '<span class="colony-ants">' + '🐜'.repeat(antCount) + '</span>' +
    (state.ants > 40 ? ` <span style="color:var(--gold);font-size:0.9rem">+${state.ants-40}</span>` : '');
  document.getElementById('colony-size-label').textContent = `${state.ants} / 100마리`;
  document.getElementById('colony-bar').style.width = Math.min(state.ants, 100) + '%';

  const goalPct = Math.min((nw / 10000) * 100, 100);
  document.getElementById('goal-bar').style.width = goalPct + '%';
  document.getElementById('goal-pct').textContent = goalPct.toFixed(1) + '%';

  updateSlider();
  drawChart();
}

function addLog(msg, type = '') {
  const log = document.getElementById('log');
  const el = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.innerHTML = `<span class="log-q">Q${state.turn}</span><span>${msg}</span>`;
  log.prepend(el);
}

function endGame(won) {
  document.getElementById('gameover').style.display = 'flex';
  if (won) {
    document.getElementById('gameover-title').textContent = '🏆 승리!';
    document.getElementById('gameover-msg').textContent =
      `${state.turn}분기 만에 목표 달성!\n최종 순자산: ${fmt(netWorth())} | 개미: ${state.ants}마리`;
  } else {
    document.getElementById('gameover-title').textContent = '💸 파산...';
    document.getElementById('gameover-msg').textContent =
      `${state.turn}분기에 자산이 모두 소진됐습니다.\n다시 도전하세요!`;
  }
}

function resetGame() {
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('log').innerHTML = '';
  document.querySelectorAll('.inv-btn').forEach(b => b.classList.remove('selected'));
  const btn = document.getElementById('invest-btn');
  btn.disabled = true;
  btn.textContent = '투자 유형을 선택하세요';
  initState();
  updateUI();
  addLog('게임 시작! 목표: 순자산 10,000 달성', 'info');
  document.getElementById('season-badge').textContent = '📅 1분기 진행 중';
}

// START
initState();
updateUI();
addLog('게임 시작! 목표: 순자산 10,000 달성', 'info');
</script>
